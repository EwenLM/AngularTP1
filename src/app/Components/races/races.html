<div>
  <ul>
    <li
      *ngFor="let city of cities; let i = index"
      class="list-group-item border rounded m-2 p-3"
      [ngClass]="getBgColor(city)"
    >
      <h3 [ngClass]="getTextColor(city)">{{ city.name }}</h3>
      <a class="btn btn-sm btn-primary" [routerLink]="['/races', i]"> Détails </a>
      <button
        class="btn btn-sm btn-success"
        *ngIf="city.attribut === 'Eteint'"
        (click)="onSwitch(i)"
      >
        Allumer
      </button>
      <button
        class="btn btn-sm btn-danger"
        *ngIf="city.attribut === 'Allume'"
        (click)="onSwitch(i)"
      >
        Eteindre
      </button>

      <input type="text" class="form-control" ngModel="city.name" />
    </li>
  </ul>
  <button type="button" class="btn btn-secondary" (click)="onSave()">Enregistrer Cities</button>
  <button type="button" class="btn btn-info" (click)="onFetch()">Récupérer Cities</button>
</div>
